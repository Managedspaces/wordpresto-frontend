# Translation Improvement Worker — refines the non-English i18n translations with DeepL and opens a
# PR for human review. It never commits to main directly: it prepares improvements, a person approves.
#
# Requires the DEEPL_API_KEY repo secret (free or pro key; the worker auto-detects the endpoint).
name: improve-translations
on:
  workflow_dispatch:
    inputs:
      files:
        description: 'Comma-separated i18n files to process (blank = all)'
        required: false
        type: string
      locales:
        description: 'Comma-separated locales, e.g. de,fr (blank = all non-English)'
        required: false
        type: string
      limit:
        description: 'Max strings per locale (blank = no limit; useful for a cheap first run)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  improve:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci --no-audit --no-fund

      - name: Run translation worker
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          # Inputs passed via env (not interpolated into the shell) to avoid command injection.
          IN_FILES: ${{ inputs.files }}
          IN_LOCALES: ${{ inputs.locales }}
          IN_LIMIT: ${{ inputs.limit }}
        run: |
          ARGS=""
          [ -n "$IN_FILES" ]   && ARGS="$ARGS --file $IN_FILES"
          [ -n "$IN_LOCALES" ] && ARGS="$ARGS --locale $IN_LOCALES"
          [ -n "$IN_LIMIT" ]   && ARGS="$ARGS --limit $IN_LIMIT"
          npx tsx scripts/i18n-worker/improve-translations.ts $ARGS

      - name: Open a PR if anything changed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No translation changes to propose."
            exit 0
          fi
          BRANCH="i18n/improve-$(date -u +%Y%m%d-%H%M%S)"
          git config user.name  "wordpresto-i18n-bot"
          git config user.email "i18n-bot@wordpresto.com"
          git checkout -b "$BRANCH"
          git add src/data/i18n i18n-changes
          git commit -m "Improve translations via DeepL (automated)"
          git push -u origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" \
            --title "Improve translations via DeepL" \
            --body "Automated run of the translation improvement worker (\`scripts/i18n-worker\`). English is the source of truth; brand and fixed-taxonomy terms are protected and each locale keeps its formality. Review the diff **and** the changelog under \`i18n-changes/\` before merging — nothing here is live until a human approves this PR."
